name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # CI does not push; skip persisting the token in git config.
          persist-credentials: false

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/* -> target
          shared-key: ${{ matrix.os }}

      - name: install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: run core tests
        # Gate the x11-idle test profile to keep the Tauri dylib clean.
        # See docs/M6.md "Known issues". The test command is on a single
        # line because Windows runners use PowerShell, which does not
        # treat backslash-newline as a continuation under `run: |`.
        run: cargo test -p rewind-core -p rewind-adapters -p rewind-storage

  frontend:
    name: frontend
    runs-on: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install frontend dependencies
        run: npm ci

      - name: type-check
        run: npm run check

      - name: build
        run: npm run build
